<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#080810;--card:#12121e;--card-hover:#1a1a2e;
--accent:#e8871e;--accent-light:#f4a03a;--accent-glow:rgba(232,135,30,.15);
--text:#e8e6e3;--text-dim:#8a8a9a;--text-muted:#55556a;
--success:#34c759;--danger:#ff3b30;
--radius:16px;--radius-sm:10px;
--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);
--safe-right:env(safe-area-inset-right,0px);
--vorleser-accent:#4a9eff;--vorleser-glow:rgba(74,158,255,.15);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);color:var(--text);
min-height:100vh;min-height:100dvh;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
padding-top:var(--safe-top);
padding-bottom:var(--safe-bottom);
padding-left:var(--safe-left);
padding-right:var(--safe-right);
}
.app{max-width:480px;margin:0 auto;padding:0 16px 100px}
/* Header */
.header{
text-align:center;padding:32px 0 8px;
}
.header h1{
font-size:1.6rem;font-weight:700;
background:linear-gradient(135deg,var(--accent),var(--accent-light));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
letter-spacing:-.5px;
}
body.vorleser-mode .header h1{
background:linear-gradient(135deg,var(--vorleser-accent),#7ab8ff);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
}
.header p{font-size:.85rem;color:var(--text-dim);margin-top:6px}

/* Mode toggle */
.mode-toggle-wrap{
display:flex;justify-content:center;padding:12px 0 20px;
}
.mode-toggle{
display:flex;
background:rgba(255,255,255,.06);
border-radius:30px;
padding:3px;
gap:0;
position:relative;
}
.mode-toggle-btn{
position:relative;z-index:1;
padding:8px 20px;
border-radius:27px;
border:none;
font-size:.82rem;font-weight:600;
cursor:pointer;
font-family:inherit;
color:var(--text-dim);
background:transparent;
transition:color .3s;
white-space:nowrap;
}
.mode-toggle-btn.active{
color:#fff;
}
.mode-toggle-slider{
position:absolute;
top:3px;
height:calc(100% - 6px);
border-radius:27px;
transition:left .35s cubic-bezier(.4,0,.2,1), width .35s cubic-bezier(.4,0,.2,1), background .35s;
z-index:0;
}
.mode-toggle-slider.ueben{
background:var(--accent);
}
.mode-toggle-slider.vorleser{
background:var(--vorleser-accent);
}

/* Category cards */
.category-card{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);
padding:20px;margin-bottom:14px;
cursor:pointer;
transition:transform .2s,box-shadow .2s,border-color .3s;
position:relative;overflow:hidden;
}
.category-card::before{
content:'';position:absolute;top:0;left:0;right:0;height:2px;
background:linear-gradient(90deg,transparent,var(--accent),transparent);
opacity:0;transition:opacity .3s;
}
body.vorleser-mode .category-card::before{
background:linear-gradient(90deg,transparent,var(--vorleser-accent),transparent);
}
.category-card:active{transform:scale(.97)}
.category-card:hover::before,.category-card:active::before{opacity:1}
.cat-icon{font-size:1.8rem;margin-bottom:8px;display:block}
.cat-title{font-size:1.05rem;font-weight:600;margin-bottom:4px}
.cat-desc{font-size:.8rem;color:var(--text-dim);line-height:1.4}
.cat-count{
display:inline-block;margin-top:10px;
font-size:.7rem;color:var(--accent);
background:var(--accent-glow);
padding:3px 10px;border-radius:20px;
}
body.vorleser-mode .cat-count{
color:var(--vorleser-accent);
background:var(--vorleser-glow);
}
/* Exercise list */
.view{display:none}
.view.active{display:block}
.back-btn{
display:inline-flex;align-items:center;gap:6px;
background:none;border:none;color:var(--accent);
font-size:.9rem;font-weight:600;cursor:pointer;
padding:16px 0;font-family:inherit;
}
body.vorleser-mode .back-btn{color:var(--vorleser-accent)}
.back-btn svg{width:18px;height:18px}
.view-title{font-size:1.3rem;font-weight:700;margin-bottom:16px}
/* Exercise cards in list */
.exercise-item{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius-sm);
padding:16px 18px;margin-bottom:10px;
cursor:pointer;
display:flex;align-items:center;justify-content:space-between;
transition:transform .15s,border-color .3s;
}
.exercise-item:active{transform:scale(.98);border-color:rgba(232,135,30,.3)}
body.vorleser-mode .exercise-item:active{border-color:rgba(74,158,255,.3)}
.exercise-item .ex-left{flex:1}
.exercise-item .ex-num{font-size:.7rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
body.vorleser-mode .exercise-item .ex-num{color:var(--vorleser-accent)}
.exercise-item .ex-name{font-size:.95rem;font-weight:600}
.exercise-item .ex-time{font-size:.75rem;color:var(--text-dim);margin-top:2px}
.exercise-item .ex-check{
width:24px;height:24px;border-radius:50%;
border:2px solid var(--text-muted);
display:flex;align-items:center;justify-content:center;
flex-shrink:0;margin-left:12px;transition:all .3s;
}
.exercise-item .ex-check.done{
border-color:var(--success);background:var(--success);
}
.exercise-item .ex-check.done::after{
content:'';width:6px;height:10px;
border:solid #fff;border-width:0 2px 2px 0;
transform:rotate(45deg);margin-top:-2px;
}
/* Exercise detail */
.detail-header{margin-bottom:20px}
.detail-header .ex-label{font-size:.75rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:1px}
body.vorleser-mode .detail-header .ex-label{color:var(--vorleser-accent)}
.detail-header h2{font-size:1.25rem;font-weight:700;margin-top:4px}
.instructions{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);padding:20px;margin-bottom:16px;
}
.instructions li{
font-size:.88rem;line-height:1.55;color:var(--text);
margin-bottom:10px;padding-left:20px;position:relative;
list-style:none;
}
.instructions li::before{
content:'';position:absolute;left:0;top:8px;
width:6px;height:6px;border-radius:50%;
background:var(--accent);
}
body.vorleser-mode .instructions li::before{background:var(--vorleser-accent)}
.merke{
background:linear-gradient(135deg,rgba(232,135,30,.12),rgba(232,135,30,.05));
border-left:3px solid var(--accent);
border-radius:0 var(--radius-sm) var(--radius-sm) 0;
padding:14px 16px;margin-bottom:16px;
}
body.vorleser-mode .merke{
background:linear-gradient(135deg,rgba(74,158,255,.12),rgba(74,158,255,.05));
border-left-color:var(--vorleser-accent);
}
.merke-label{font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
body.vorleser-mode .merke-label{color:var(--vorleser-accent)}
.merke p{font-size:.85rem;color:var(--text);line-height:1.5;font-style:italic}
/* Timer */
.timer-container{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);padding:28px 20px;
text-align:center;margin-bottom:16px;
}
.timer-display{
font-size:3.2rem;font-weight:200;
font-variant-numeric:tabular-nums;
letter-spacing:2px;
color:var(--text);
margin-bottom:20px;
}
.timer-progress{
width:100%;height:4px;background:rgba(255,255,255,.08);
border-radius:2px;margin-bottom:20px;overflow:hidden;
}
.timer-progress-bar{
height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));
border-radius:2px;transition:width .3s;width:0%;
}
.timer-buttons{display:flex;gap:10px;justify-content:center}
.timer-btn{
padding:12px 28px;border-radius:30px;
border:none;font-size:.9rem;font-weight:600;
cursor:pointer;font-family:inherit;
transition:transform .15s,opacity .15s;
}
.timer-btn:active{transform:scale(.95)}
.btn-start{background:var(--accent);color:#fff}
.btn-pause{background:rgba(255,255,255,.1);color:var(--text)}
.btn-reset{background:rgba(255,255,255,.06);color:var(--text-dim)}
.btn-done{background:var(--success);color:#fff}
/* Info cards (Tipps) */
.info-card{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);padding:18px;margin-bottom:12px;
}
.info-card .info-num{
display:inline-flex;align-items:center;justify-content:center;
width:26px;height:26px;border-radius:50%;
background:var(--accent-glow);color:var(--accent);
font-size:.75rem;font-weight:700;margin-bottom:8px;
}
body.vorleser-mode .info-card .info-num{
background:var(--vorleser-glow);color:var(--vorleser-accent);
}
.info-card h3{font-size:.95rem;font-weight:600;margin-bottom:6px}
.info-card p{font-size:.83rem;color:var(--text-dim);line-height:1.5}
/* Progress bar at bottom */
.session-bar{
position:fixed;bottom:0;left:0;right:0;
background:linear-gradient(0deg,var(--bg) 60%,transparent);
padding:16px 16px calc(16px + var(--safe-bottom));
text-align:center;
z-index:100;
}
.session-inner{
max-width:480px;margin:0 auto;
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;padding:10px 20px;
display:flex;align-items:center;justify-content:space-between;
}
.session-text{font-size:.8rem;color:var(--text-dim)}
.session-text span{color:var(--accent);font-weight:600}
body.vorleser-mode .session-text span{color:var(--vorleser-accent)}
.session-progress-wrap{
flex:1;height:4px;background:rgba(255,255,255,.06);
border-radius:2px;margin:0 14px;overflow:hidden;
}
.session-progress-fill{
height:100%;border-radius:2px;
background:linear-gradient(90deg,var(--accent),var(--accent-light));
transition:width .4s ease;
}
body.vorleser-mode .session-progress-fill{
background:linear-gradient(90deg,var(--vorleser-accent),#7ab8ff);
}
.session-pct{font-size:.8rem;color:var(--accent);font-weight:600}
body.vorleser-mode .session-pct{color:var(--vorleser-accent)}
/* Attribution */
.attribution{
text-align:center;padding:32px 0 16px;
font-size:.72rem;color:var(--text-muted);
}
.attribution a{color:var(--text-dim);text-decoration:none}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease both}
.fade-in-d1{animation-delay:.05s}
.fade-in-d2{animation-delay:.1s}
.fade-in-d3{animation-delay:.15s}
.fade-in-d4{animation-delay:.2s}

/* ═══════ VORLESER STYLES ═══════ */
.vorleser-card{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-left:3px solid var(--vorleser-accent);

.tipps-vorleser-btn:not(.playing)::after{content:'Vorlesen'}

/* ── VORLESER TEXTS ── */
const vorleserTexts = {
'u2': 'In dieser Übung lässt du deine Kehle locker mit Federn. Du stehst und federst in den Knien. Jetzt öffnest du den Mund und du lässt deine Stimme dazu. Richtig toll federn und Stimme geben. Mach mal kleine Melodiebögen und lass deine Kehle federn. Dein Mund sollte dabei ungefähr zwei Finger weit offen sein. Ein Finger wäre Minimum. Du entspannst deine Mundwinkel, so dass mit ganz entspanntem Gesicht du das A machst. Die Zunge berührt die untere Zahnreihe. Jetzt lächeln und entspannen den Mund. Die Stimme wird flach und hell, wenn wir den Mund zu einem Lächeln breit ziehen. Die Stimme klingt tiefer und klangvoller, wenn wir den Mund aufmachen und die Lippen entspannen beim Sprechen. Lächle, wann immer dir danach von Herzen zumute ist, aber entspanne deinen Mund, wenn du etwas Wichtiges zu sagen hast, wenn du gehört werden willst.',
'u3': 'Dein Mund ist eigentlich ein Megafon und deine Hände verlängern das Megafon. Beim Wörtchen Hallo machen wir das automatisch so. Mal ganz leise, aber trotzdem mit offenem Mund. Und hier noch einmal ganz laut und nimm die Hände als Megafon dazu. Hallo! Mach\'s Maul auf, dann schaut man drauf. Das hat schon Martin Luther im sechzehnten Jahrhundert gesagt. Wenn du lernst deinen Mund zu öffnen, dein Megafon einzusetzen, dann wirst du gehört, dann schaut man auf dich und dann überzeugst du.',
'u4': 'Wir haben oft verlernt, das Maul aufzumachen. Der Buchstabe A ist ungefähr zwei Finger weit offen. Mundwinkel entspannt. Ein ganz entspannter Buchstabe. Aha. Die Zunge berührt die unteren Schneidezähne. Wir können üben, das Maul aufzumachen, indem wir bei allen A die wir sprechen, den Mund übertrieben weit öffnen. Sprich einfach nach und bei dem A öffnest du deinen Mund weit, Mundwinkel entspannt. Herr von Hagen, darf ich fragen, welchen Kragen Sie getragen, als Sie lagen, krank am Magen, im Hospital zu Kopenhagen.',
'u5': 'Beweg dich im Raum und zeichne mit einer Hand fortlaufend eine schwungvolle liegende Acht in die Luft. Dazu sprichst du rhythmisch einen Satz. Nach dem Satz öffnest du den Mund, so weit, dass ein kleiner Abstand zwischen den Zähnen zu sehen ist. Entspann dabei die Lippen. In der Einatempause sind die Mundwinkel entspannt. Ganz entspanntes Gesicht. Man hört keinerlei Einatem. Mund öffnen. Atem ein. Ich spreche einen Satz. Wenn du den Mund in der Einatempause schließt, fällst du aus dem natürlichen Atemrhythmus. Wenn du ihn schließt, nimmst du dir außerdem ein Stück deiner Wirkung weg.',
'u6': 'Wo liegt jetzt deine Zungenspitze? Deine Zungenspitze liegt in Ruhe zentral hinter den oberen Schneidezähnen auf dem kleinen Wulst, dem sogenannten Alveolarrand. Die richtige Zungenruhelage ist sehr wichtig. Der Kontakt der Zungenspitze mit dem Alveolarrand ist notwendig für das korrekte Schlucken. Dieser Kontakt reguliert die Atemfunktion. Dieser Kontakt regt den Transport der Lymphe an. Und mit diesem Kontakt werden die Buchstaben L, N, T und D gebildet. Falls du feststellst, dass deine Zunge nie den richtigen Ruheplatz hat, dann musst du das unbedingt trainieren. Halte mit der Zungenspitze dreimal am Tag für etwa zehn Minuten eine Haferflocke an diesem Platz fest.',
'u7': 'Du sprichst das A und dann lässt du den Mund offen und sprichst mit geöffnetem Mund das L und kommst zurück zum A. A-L-A. Du lässt den Mund offen und deine Zungenspitze geht alleine hoch, hinter die oberen Schneidezähne für das L. Und an der gleichen Stelle ist das N. A-N-A. Und bei dem N lässt du deinen Mund offen. An der gleichen Stelle ist auch das T und das D. Nur deine Zunge turnt, alles andere im Gesicht bleibt entspannt. Mundwinkel auch. Der Kontakt der Zungenmitte mit dem Gaumen bei den Lauten K und G muss aktiv sein, damit der Kehldeckel sich gut aufrichtet und der Klang deiner Stimme frei transportiert wird.',
'u8': 'Probier mal A zu sagen mit geöffnetem Mund, ungefähr ein Finger weit. Die Zunge berührt die unteren Schneidezähne und dort bleibt sie auch liegen. A-K-A-K. Die Zunge macht einen Buckel, der gegen den Gaumen drückt, und dann fällt sie wieder runter zum A. Genauso geht das G. A-G-A-G. Deine Zunge macht einen richtigen Buckel. Und an der gleichen Stelle ist das NG. Lang. Dein Mund ist die ganze Zeit offen. Innen ist deine Zunge super lebendig. Einmal geht die Zungenspitze hoch, dann fällt sie wieder runter. Jetzt geht der Zungenrücken hoch und fällt wieder runter.',
'u9': 'Du nimmst zum Beispiel den Anfang einer Rede und trainierst Buchstabe für Buchstabe. Du sprichst mit leicht geöffnetem Mund, Buchstabe für Buchstabe und fühlst dabei ganz genau, wie der Buchstabe im Mund entsteht. Unser Satz heißt: Erlaube mir, feines Mädchen. Merkst du, wie bei dem B die Lippen zusammengehen? Beim korrekten M sind die Zähne locker zusammen, die Lippen völlig entspannt. Beim F sind die Zähne auf der Unterlippe. Beim N geht die Zungenspitze hoch. Beim CH macht deine Zunge einen Wulst, der dann reibt an den Backenzähnen. Bei allen Vokalen ist der Mund leicht geöffnet.',
'u10': 'Stimme macht Stimmung. Wenn wir eine Stimme hören, spielt unser Körper nach, was im anderen vorgeht. Sobald jemand das Wort ergreift, werden alle Emotionen unbewusst auf den Gesprächspartner übertragen. Wenn du mit schlechter Energie in das nächste Gespräch eilst, überträgst du unbewusst all deine Gefühle und Spannungen auf deinen neuen Gesprächspartner. Deshalb eine Miniübung zur Psychohygiene: Du stellst dir etwas Ekliges vor und dann schüttelst du deinen Kopf und sagst laut Bäh! Steiger dich da richtig rein.',
'g1': 'Der Gorilla läuft schnell auf zwei Beinen. Damit weckt er die Energie und findet Präsenz auf Knopfdruck. Bewege dich, bis du dich erfrischt, wach und energievoll fühlst. Gehe vor einem wichtigen Telefonat oder einer Besprechung schnellen Schrittes um den Block. Oder hüpfe auf einem Bein hin und auf dem anderen zurück. Oder lege dir eine fetzige Musik auf und federe eine Minute aus den Knien. Es dauert nur eine Minute und gibt dir so viel Power.',

let currentCatId = null;

/* ── VORLESER STATE ── */
let vSentences = [];

let vPaused = false;
let vRate = 1.0;

/* Voice selection */
let availableVoices = [];
let selectedVoiceURI = localStorage.getItem('loschky-voice-uri')||'';

function isEnhanced(v){
  const n=v.name.toLowerCase();
  return n.includes('enhanced')||n.includes('premium')||n.includes('neural')||n.includes('natural');
}

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  availableVoices = voices.filter(v => v.lang && v.lang.startsWith('de'));
  availableVoices.sort((a,b)=>{
    const aE=isEnhanced(a)?0:1;
    const bE=isEnhanced(b)?0:1;
    if(aE!==bE)return aE-bE;
    if(a.localService!==b.localService)return a.localService?-1:1;
    return a.name.localeCompare(b.name);
  });
  // Set best voice as default
  if(!selectedVoiceURI && availableVoices.length>0){
    selectedVoiceURI = availableVoices[0].voiceURI;
  }
  vGermanVoice = getSelectedVoice();
  populateVoiceSelect();
}

function getSelectedVoice(){
  if(selectedVoiceURI){
    const v=availableVoices.find(v=>v.voiceURI===selectedVoiceURI);
    if(v)return v;
  }
  return availableVoices.length>0?availableVoices[0]:null;
}

function populateVoiceSelect(){
  const sel=document.getElementById('voiceSelect');
  if(!sel)return;
  sel.innerHTML='';
  if(availableVoices.length===0){
    sel.innerHTML='<option value="">Keine deutsche Stimme gefunden</option>';
    return;
  }
  availableVoices.forEach(v=>{
    const opt=document.createElement('option');
    opt.value=v.voiceURI;
    let label=v.name.replace('com.apple.','').replace('speech.synthesis.voice.','');
    if(isEnhanced(v))label+=' ★';
    else if(v.localService)label+=' (lokal)';
    else label+=' (online)';
    opt.textContent=label;
    sel.appendChild(opt);
  });
  if(selectedVoiceURI && availableVoices.find(v=>v.voiceURI===selectedVoiceURI)){
    sel.value=selectedVoiceURI;
  }else if(availableVoices.length>0){
    sel.value=availableVoices[0].voiceURI;
  }
  const hint=document.getElementById('voiceHint');
  if(hint){hint.style.display=availableVoices.some(v=>isEnhanced(v))?'none':'block'}
}

function onVoiceChange(uri){
  selectedVoiceURI=uri;
  localStorage.setItem('loschky-voice-uri',uri);
  vGermanVoice=getSelectedVoice();
  if(vPlaying&&!vPaused){
    speechSynthesis.cancel();
    speakSentence(vCurrentIdx);
  }
}

if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function splitSentences(text) {
  // Split on sentence-ending punctuation followed by space or end
  return text.match(/[^.!?]+[.!?]+(\s|$)/g) || [text];
}

function getProgress(){
try{return JSON.parse(localStorage.getItem('loschky_progress'))||{}}catch(e){return{}}
}
function setDone(id){
const p=getProgress();
const today=new Date().toISOString().slice(0,10);
if(!p[today])p[today]={};
p[today][id]=true;
localStorage.setItem('loschky_progress',JSON.stringify(p));
updateSessionBar();
}
function isDone(id){
const p=getProgress();
const today=new Date().toISOString().slice(0,10);
return p[today]&&p[today][id];
}
function todayCount(){
const p=getProgress();
const today=new Date().toISOString().slice(0,10);
return p[today]?Object.keys(p[today]).length:0;
}
function totalExercises(){
let c=0;categories.forEach(cat=>{if(cat.exercises)c+=cat.exercises.length});return c;
}
function updateSessionBar(){
const done=todayCount(),total=totalExercises();
document.getElementById('done-count').textContent=done;
document.getElementById('total-count').textContent=total;
const pct=total?Math.round(done/total*100):0;
document.getElementById('session-pct').textContent=pct+'%';
document.getElementById('session-fill').style.width=pct+'%';
}

/* ── MODE TOGGLE ── */
function setMode(mode) {
  vorleserMode = (mode === 'vorleser');
  localStorage.setItem('loschky_mode', mode);
  document.body.classList.toggle('vorleser-mode', vorleserMode);
  // Update toggle buttons
  document.getElementById('btn-mode-ueben').classList.toggle('active', !vorleserMode);
  document.getElementById('btn-mode-vorleser').classList.toggle('active', vorleserMode);
  // Update slider
  const slider = document.getElementById('mode-slider');
  const btnUeben = document.getElementById('btn-mode-ueben');
  const btnVorleser = document.getElementById('btn-mode-vorleser');
  if (vorleserMode) {
    slider.className = 'mode-toggle-slider vorleser';
    slider.style.left = btnVorleser.offsetLeft + 'px';
    slider.style.width = btnVorleser.offsetWidth + 'px';
  } else {
    slider.className = 'mode-toggle-slider ueben';
    slider.style.left = btnUeben.offsetLeft + 'px';
    slider.style.width = btnUeben.offsetWidth + 'px';
  }
  // Stop any playing TTS
  stopVorleser();
}

function initModeToggle() {
  // Set initial state
  if (vorleserMode) {
    document.body.classList.add('vorleser-mode');
    document.getElementById('btn-mode-ueben').classList.remove('active');
    document.getElementById('btn-mode-vorleser').classList.add('active');
  }
  // Position slider after a frame so layout is settled
  requestAnimationFrame(() => {
    const slider = document.getElementById('mode-slider');
    const btnUeben = document.getElementById('btn-mode-ueben');
    const btnVorleser = document.getElementById('btn-mode-vorleser');
    if (vorleserMode) {
      slider.className = 'mode-toggle-slider vorleser';
      slider.style.left = btnVorleser.offsetLeft + 'px';
      slider.style.width = btnVorleser.offsetWidth + 'px';
    } else {
      slider.className = 'mode-toggle-slider ueben';
      slider.style.left = btnUeben.offsetLeft + 'px';
      slider.style.width = btnUeben.offsetWidth + 'px';
    }
  });
}

function renderVorleserCard(exId) {
  const text = vorleserTexts[exId];
  const sentences = splitSentences(text);
  const sentenceSpans = sentences.map((s, i) =>
    `<span class="v-sentence" data-idx="${i}">${s.trim()} </span>`
  ).join('');
  const speeds = [0.7, 0.8, 0.9, 1.0, 1.1, 1.2];
  const speedPills = speeds.map(sp =>
    `<button class="speed-pill${sp===vRate?' active':''}" onclick="setVorleserSpeed(${sp})">${sp}x</button>`
  ).join('');

  return `<div class="vorleser-card fade-in fade-in-d2">
    <div class="vorleser-card-title">Vorleser</div>
    <div class="vorleser-text-area" id="v-text-area">${sentenceSpans}</div>
    <div class="vorleser-controls">
      <div class="vorleser-main-btns">
        <button class="v-btn-skip" onclick="vorleserSkipPrev()" title="Vorheriger Satz"><div class="skip-prev-icon"></div></button>
        <button class="v-btn-play" id="v-btn-play" onclick="toggleVorleser()" title="Abspielen / Pause"><div class="play-icon" id="v-play-icon"></div></button>
        <button class="v-btn-skip" onclick="vorleserSkipNext()" title="Nächster Satz"><div class="skip-next-icon"></div></button>
        <button class="v-btn-stop" onclick="stopVorleser()" title="Stopp"><div class="stop-icon"></div></button>
      </div>
      <div class="vorleser-speed" id="v-speed-pills">${speedPills}</div>
      <div class="vorleser-progress-text" id="v-progress">Satz 1 von ${sentences.length}</div>
      <div class="voice-control">
        <span class="voice-label">Stimme</span>
        <select class="voice-select" id="voiceSelect" onchange="onVoiceChange(this.value)">
          <option value="">Wird geladen...</option>
        </select>
        <div class="voice-hint" id="voiceHint">💡 Tipp: Lade auf dem iPhone unter Einstellungen → Bedienungshilfen → Gesprochene Inhalte → Stimmen → Deutsch hochwertige Stimmen herunter (z.B. Anna Enhanced)</div>
      </div>
    </div>
  </div>`;
}

function initVorleserForExercise(exId) {
  const text = vorleserTexts[exId];
  vSentences = splitSentences(text).map(s => s.trim());
  vCurrentIdx = 0;
  vPlaying = false;
  vPaused = false;
  updateVorleserUI();
  populateVoiceSelect();
}

/* ── VORLESER CONTROL ── */
function toggleVorleser() {
  if (vPlaying && !vPaused) {
    // Pause
    speechSynthesis.pause();
    vPaused = true;
    updatePlayButton(false);
  } else if (vPaused) {
    // Resume
    speechSynthesis.resume();
    vPaused = false;
    updatePlayButton(true);
  } else {
    // Start playing from current sentence
    vPlaying = true;
    vPaused = false;
    speakSentence(vCurrentIdx);
    updatePlayButton(true);
  }
}

function getNextExerciseInCategory(catId, currentExId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat || !cat.exercises) return null;
  const idx = cat.exercises.findIndex(e => e.id === currentExId);
  if (idx >= 0 && idx < cat.exercises.length - 1) {
    return cat.exercises[idx + 1];
  }
  return null;
}

function onVorleserFinished() {
  // Aktuelle Übung als fertig markieren
  const cat = categories.find(c => c.id === currentCatId);
  if (cat && cat.exercises) {
    const currentEx = cat.exercises.find(e => vorleserTexts[e.id] && e.id === getCurrentExerciseId());
    if (currentEx) {
      markDone(currentEx.id);
    }
  }
  stopVorleser();
  // Nächste Übung in der Kategorie finden und automatisch starten
  const nextEx = getNextExerciseInCategory(currentCatId, getCurrentExerciseId());
  if (nextEx && vorleserTexts[nextEx.id]) {
    setTimeout(() => {
      showExercise(currentCatId, nextEx.id);
      // Auto-Start Vorleser nach kurzem Delay
      setTimeout(() => {
        if (vorleserMode && vSentences.length > 0) {
          vPlaying = true;
          vPaused = false;
          speakSentence(0);
          updatePlayButton(true);
        }
      }, 800);
    }, 1500);
  }
}

function getCurrentExerciseId() {
  // Finde aktuelle Übung anhand der geladenen Sätze
  for (const [exId, text] of Object.entries(vorleserTexts)) {
    const sentences = splitSentences(text).map(s => s.trim());
    if (sentences.length === vSentences.length && sentences[0] === vSentences[0]) {
      return exId;
    }
  }
  return null;
}

function speakSentence(idx) {
  if (idx >= vSentences.length) {
    onVorleserFinished();
    return;
  }
  speechSynthesis.cancel();
  vCurrentIdx = idx;
  vPaused = false;
  const utt = new SpeechSynthesisUtterance(vSentences[idx]);
  utt.lang = 'de-DE';
  utt.rate = vRate;
  if (vGermanVoice) utt.voice = vGermanVoice;
  utt.onend = function() {
    if (!vPlaying) return;
    // Move to next sentence
    vCurrentIdx++;
    if (vCurrentIdx < vSentences.length) {
      updateVorleserUI();
      speakSentence(vCurrentIdx);
    } else {
      onVorleserFinished();
    }
  };
  utt.onerror = function() {
    stopVorleser();
  };
  vUtterance = utt;
  updateVorleserUI();
  speechSynthesis.speak(utt);
}

function stopVorleser() {
  speechSynthesis.cancel();
  vPlaying = false;
  vPaused = false;
  updatePlayButton(false);
  // Don't reset position so user can resume where they left off
}

function vorleserSkipNext() {
  if (vCurrentIdx < vSentences.length - 1) {
    vCurrentIdx++;
    if (vPlaying) {
      speakSentence(vCurrentIdx);
    } else {
      updateVorleserUI();
    }
  }
}

function vorleserSkipPrev() {
  if (vCurrentIdx > 0) {
    vCurrentIdx--;
    if (vPlaying) {
      speakSentence(vCurrentIdx);
    } else {
      updateVorleserUI();
    }
  }
}

function setVorleserSpeed(rate) {
  vRate = rate;
  // Update speed pills
  const pills = document.getElementById('v-speed-pills');
  if (pills) {
    pills.querySelectorAll('.speed-pill').forEach(p => {
      p.classList.toggle('active', parseFloat(p.textContent) === rate);
    });
  }
  // If currently playing, restart current sentence with new speed
  if (vPlaying && !vPaused) {
    speakSentence(vCurrentIdx);
  }
}

function updateVorleserUI() {
  // Highlight sentences
  const area = document.getElementById('v-text-area');
  if (!area) return;
  const spans = area.querySelectorAll('.v-sentence');
  spans.forEach((sp, i) => {
    sp.classList.remove('v-active', 'v-read');
    if (i === vCurrentIdx) {
      sp.classList.add('v-active');
    } else if (i < vCurrentIdx) {
      sp.classList.add('v-read');
    }
  });
  // Auto-scroll to active sentence
  const active = area.querySelector('.v-active');
  if (active) {
    active.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  // Update progress text
  const prog = document.getElementById('v-progress');
  if (prog) {
    prog.textContent = `Satz ${vCurrentIdx + 1} von ${vSentences.length}`;
  }
}

function updatePlayButton(playing) {
  const btn = document.getElementById('v-btn-play');
  if (!btn) return;
  const icon = document.getElementById('v-play-icon');
  if (!icon) return;
  if (playing) {
    icon.className = 'pause-icon';
    icon.innerHTML = '<span></span><span></span>';
  } else {
    icon.className = 'play-icon';
    icon.innerHTML = '';
  }
}

/* ── TIPPS VORLESER ── */
let tippVPlaying = {};

function toggleTippVorleser(idx) {
  const btn = document.getElementById('tipps-v-btn-' + idx);
  if (tippVPlaying[idx]) {
    speechSynthesis.cancel();
    tippVPlaying = {};
    if (btn) btn.classList.remove('playing');
    return;
  }
  // Stop any other
  speechSynthesis.cancel();
  Object.keys(tippVPlaying).forEach(k => {
    const ob = document.getElementById('tipps-v-btn-' + k);
    if (ob) ob.classList.remove('playing');
  });
  tippVPlaying = {};
  tippVPlaying[idx] = true;
  if (btn) btn.classList.add('playing');

  const utt = new SpeechSynthesisUtterance(tippVorleserTexts[idx]);
  utt.lang = 'de-DE';
  utt.rate = vRate;
  if (vGermanVoice) utt.voice = vGermanVoice;
  utt.onend = function() {
    tippVPlaying = {};
    if (btn) btn.classList.remove('playing');
  };
  utt.onerror = function() {
    tippVPlaying = {};
    if (btn) btn.classList.remove('playing');
  };
  speechSynthesis.speak(utt);
}

/* ── TIMER ── */
function pad(n){return n<10?'0'+n:''+n}

function startTimer(duration,exId){
if(!timerRunning){
if(timerRemaining<=0)timerRemaining=duration;
timerTotal=duration;
timerRunning=true;
document.getElementById('btn-start').style.display='none';
document.getElementById('btn-pause').style.display='';
document.getElementById('btn-reset').style.display='';
document.getElementById('btn-done').style.display='none';
timerInterval=setInterval(()=>{
timerRemaining--;
updateTimerDisplay();
if(timerRemaining<=0){
stopTimer();
document.getElementById('btn-start').style.display='none';
document.getElementById('btn-pause').style.display='none';
document.getElementById('btn-done').style.display='';
if(navigator.vibrate)navigator.vibrate([200,100,200]);
markDone(exId);
}
},1000);
}
}
function pauseTimer(){
timerRunning=false;
clearInterval(timerInterval);
document.getElementById('btn-start').style.display='';
document.getElementById('btn-start').textContent='Weiter';
document.getElementById('btn-pause').style.display='none';
}
function resetTimer(duration){
stopTimer();
timerRemaining=duration;timerTotal=duration;
updateTimerDisplay();
document.getElementById('btn-start').style.display='';
document.getElementById('btn-start').textContent='Start';
document.getElementById('btn-pause').style.display='none';
document.getElementById('btn-reset').style.display='none';
document.getElementById('btn-done').style.display='none';
}
function stopTimer(){
timerRunning=false;clearInterval(timerInterval);
}
function updateTimerDisplay(){
const m=Math.floor(timerRemaining/60);
const s=timerRemaining%60;
const disp=document.getElementById('timer-display');
if(disp)disp.textContent=pad(m)+':'+pad(s);
const bar=document.getElementById('timer-bar');
if(bar)bar.style.width=((timerTotal-timerRemaining)/timerTotal*100)+'%';
}
function markDone(exId){
setDone(exId);
updateSessionBar();
/* refresh check in category list if we go back */
}

/* ── HINTERGRUND-WIEDERGABE (iOS Screen-Lock Fix) ── */
// Silent WAV (1 sample, 8kHz mono) als base64 — hält Audio-Session aktiv
const SILENT_WAV='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAABCxAgACABAAZGF0YQAAAAA=';
const silentAudio=new Audio(SILENT_WAV);
silentAudio.loop=true;
silentAudio.volume=0.01;

let keepAliveInterval=null;

function startKeepAlive(){
  // Stille Audio starten (hält iOS Audio-Session am Leben)
  silentAudio.play().catch(()=>{});
  // Periodisch speechSynthesis pingen, damit iOS es nicht pausiert
  if(!keepAliveInterval){
    keepAliveInterval=setInterval(()=>{
      if(typeof speechSynthesis!=='undefined' && speechSynthesis.speaking && !speechSynthesis.paused){
        speechSynthesis.pause();
        speechSynthesis.resume();
      }
    },8000);
  }
}

function stopKeepAlive(){
  silentAudio.pause();
  silentAudio.currentTime=0;
  if(keepAliveInterval){
    clearInterval(keepAliveInterval);
    keepAliveInterval=null;
  }
}

// Wenn App in den Hintergrund geht / zurückkommt
document.addEventListener('visibilitychange',()=>{
  if(document.hidden) return;
  // App ist wieder sichtbar — Speech fortsetzen falls nötig
  if(typeof speechSynthesis==='undefined') return;
  if(vPlaying && !vPaused){
    // iOS hat möglicherweise die Sprache gestoppt
    if(!speechSynthesis.speaking){
      speakSentence(vCurrentIdx);
    } else {
      speechSynthesis.resume();
    }
  }
  // Auch Tipps-Vorleser prüfen
  const anyTipp=Object.keys(tippVPlaying).find(k=>tippVPlaying[k]);
  if(anyTipp && !speechSynthesis.speaking){
    // Tipp war aktiv aber wurde gestoppt — neu starten
    toggleTippVorleser(parseInt(anyTipp));
    toggleTippVorleser(parseInt(anyTipp));
  }
});

// KeepAlive in speakSentence/stopVorleser einbinden
const _origSpeakSentence=speakSentence;
speakSentence=function(idx){
  startKeepAlive();
  _origSpeakSentence(idx);
};
const _origStopVorleser=stopVorleser;
stopVorleser=function(){
  _origStopVorleser();
  stopKeepAlive();
};
const _origToggleTippVorleser=toggleTippVorleser;
toggleTippVorleser=function(idx){
  const wasTippPlaying=!!tippVPlaying[idx];
  _origToggleTippVorleser(idx);
  if(!wasTippPlaying && tippVPlaying[idx]){
    startKeepAlive();
  } else if(wasTippPlaying){
    stopKeepAlive();
  }
};

/* ── INIT ── */
renderCategories();
updateSessionBar();
initModeToggle();

/* ── SERVICE WORKER (inline) ── */
if('serviceWorker' in navigator){
const swCode=`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>self.clients.claim());
self.addEventListener('fetch',e=>{
e.respondWith(
caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
return caches.open('loschky-v2').then(c=>{c.put(e.request,res.clone());return res;});
}).catch(()=>new Response('Offline',{status:503})))
);
});`;
const blob=new Blob([swCode],{type:'application/javascript'});
navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
