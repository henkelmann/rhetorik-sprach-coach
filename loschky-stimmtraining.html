<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#080810;--card:#12121e;--card-hover:#1a1a2e;
--accent:#e8871e;--accent-light:#f4a03a;--accent-glow:rgba(232,135,30,.15);
--text:#e8e6e3;--text-dim:#8a8a9a;--text-muted:#55556a;
--success:#34c759;--danger:#ff3b30;
--radius:16px;--radius-sm:10px;
--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);
--safe-right:env(safe-area-inset-right,0px);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);color:var(--text);
min-height:100vh;min-height:100dvh;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
padding-top:var(--safe-top);
padding-bottom:var(--safe-bottom);
padding-left:var(--safe-left);
padding-right:var(--safe-right);
}
.app{max-width:480px;margin:0 auto;padding:0 16px 100px}
/* Header */
.header{
text-align:center;padding:32px 0 24px;
}
.header h1{
font-size:1.6rem;font-weight:700;
background:linear-gradient(135deg,var(--accent),var(--accent-light));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
letter-spacing:-.5px;
}
.header p{font-size:.85rem;color:var(--text-dim);margin-top:6px}
/* Category cards */
.category-card{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);
padding:20px;margin-bottom:14px;
cursor:pointer;
transition:transform .2s,box-shadow .2s,border-color .3s;
position:relative;overflow:hidden;
}
.category-card::before{
content:'';position:absolute;top:0;left:0;right:0;height:2px;
background:linear-gradient(90deg,transparent,var(--accent),transparent);
opacity:0;transition:opacity .3s;
}
.category-card:active{transform:scale(.97)}
.category-card:hover::before,.category-card:active::before{opacity:1}
.cat-icon{font-size:1.8rem;margin-bottom:8px;display:block}
.cat-title{font-size:1.05rem;font-weight:600;margin-bottom:4px}
.cat-desc{font-size:.8rem;color:var(--text-dim);line-height:1.4}
.cat-count{
display:inline-block;margin-top:10px;
font-size:.7rem;color:var(--accent);
background:var(--accent-glow);
padding:3px 10px;border-radius:20px;
}
/* Exercise list */
.view{display:none}
.view.active{display:block}
.back-btn{
display:inline-flex;align-items:center;gap:6px;
background:none;border:none;color:var(--accent);
font-size:.9rem;font-weight:600;cursor:pointer;
padding:16px 0;font-family:inherit;
}
.back-btn svg{width:18px;height:18px}
.view-title{font-size:1.3rem;font-weight:700;margin-bottom:16px}
/* Exercise cards in list */
.exercise-item{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius-sm);
padding:16px 18px;margin-bottom:10px;
cursor:pointer;
display:flex;align-items:center;justify-content:space-between;
transition:transform .15s,border-color .3s;
}
.exercise-item:active{transform:scale(.98);border-color:rgba(232,135,30,.3)}
.exercise-item .ex-left{flex:1}
.exercise-item .ex-num{font-size:.7rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.exercise-item .ex-name{font-size:.95rem;font-weight:600}
.exercise-item .ex-time{font-size:.75rem;color:var(--text-dim);margin-top:2px}
.exercise-item .ex-check{
width:24px;height:24px;border-radius:50%;
border:2px solid var(--text-muted);
display:flex;align-items:center;justify-content:center;
flex-shrink:0;margin-left:12px;transition:all .3s;
}
.exercise-item .ex-check.done{
border-color:var(--success);background:var(--success);
}
.exercise-item .ex-check.done::after{
content:'';width:6px;height:10px;
border:solid #fff;border-width:0 2px 2px 0;
transform:rotate(45deg);margin-top:-2px;
}
/* Exercise detail */
.detail-header{margin-bottom:20px}
.detail-header .ex-label{font-size:.75rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.detail-header h2{font-size:1.25rem;font-weight:700;margin-top:4px}
.instructions{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);padding:20px;margin-bottom:16px;
}
.instructions li{
font-size:.88rem;line-height:1.55;color:var(--text);
margin-bottom:10px;padding-left:20px;position:relative;
list-style:none;
}
.instructions li::before{
content:'';position:absolute;left:0;top:8px;
width:6px;height:6px;border-radius:50%;
background:var(--accent);
}
.merke{
background:linear-gradient(135deg,rgba(232,135,30,.12),rgba(232,135,30,.05));
border-left:3px solid var(--accent);
border-radius:0 var(--radius-sm) var(--radius-sm) 0;
padding:14px 16px;margin-bottom:16px;
}
.merke-label{font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.merke p{font-size:.85rem;color:var(--text);line-height:1.5;font-style:italic}
/* Timer */
.timer-container{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);padding:28px 20px;
text-align:center;margin-bottom:16px;
}
.timer-display{
font-size:3.2rem;font-weight:200;
font-variant-numeric:tabular-nums;
letter-spacing:2px;
color:var(--text);
margin-bottom:20px;
}
.timer-progress{
width:100%;height:4px;background:rgba(255,255,255,.08);
border-radius:2px;margin-bottom:20px;overflow:hidden;
}
.timer-progress-bar{
height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));
border-radius:2px;transition:width .3s;width:0%;
}
.timer-buttons{display:flex;gap:10px;justify-content:center}
.timer-btn{
padding:12px 28px;border-radius:30px;
border:none;font-size:.9rem;font-weight:600;
cursor:pointer;font-family:inherit;
transition:transform .15s,opacity .15s;
}
.timer-btn:active{transform:scale(.95)}
.btn-start{background:var(--accent);color:#fff}
.btn-pause{background:rgba(255,255,255,.1);color:var(--text)}
.btn-reset{background:rgba(255,255,255,.06);color:var(--text-dim)}
.btn-done{background:var(--success);color:#fff}
/* Info cards (Tipps) */
.info-card{
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);padding:18px;margin-bottom:12px;
}
.info-card .info-num{
display:inline-flex;align-items:center;justify-content:center;
width:26px;height:26px;border-radius:50%;
background:var(--accent-glow);color:var(--accent);
font-size:.75rem;font-weight:700;margin-bottom:8px;
}
.info-card h3{font-size:.95rem;font-weight:600;margin-bottom:6px}
.info-card p{font-size:.83rem;color:var(--text-dim);line-height:1.5}
/* Progress bar at bottom */
.session-bar{
position:fixed;bottom:0;left:0;right:0;
background:linear-gradient(0deg,var(--bg) 60%,transparent);
padding:16px 16px calc(16px + var(--safe-bottom));
text-align:center;
z-index:100;
}
.session-inner{
max-width:480px;margin:0 auto;
background:linear-gradient(145deg,var(--card),#0e0e1a);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;padding:10px 20px;
display:flex;align-items:center;justify-content:space-between;
}
.session-text{font-size:.8rem;color:var(--text-dim)}
.session-text span{color:var(--accent);font-weight:600}
.session-progress-wrap{
flex:1;height:4px;background:rgba(255,255,255,.06);
border-radius:2px;margin:0 14px;overflow:hidden;
}
.session-progress-fill{
height:100%;border-radius:2px;
background:linear-gradient(90deg,var(--accent),var(--accent-light));
transition:width .4s ease;
}
.session-pct{font-size:.8rem;color:var(--accent);font-weight:600}
/* Attribution */
.attribution{
text-align:center;padding:32px 0 16px;
font-size:.72rem;color:var(--text-muted);
}
.attribution a{color:var(--text-dim);text-decoration:none}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease both}
.fade-in-d1{animation-delay:.05s}
.fade-in-d2{animation-delay:.1s}
.fade-in-d3{animation-delay:.15s}
.fade-in-d4{animation-delay:.2s}
</style>
</head>
<body>

<div class="app" id="app">

<!-- HOME VIEW -->
<div class="view active" id="view-home">
<div class="header fade-in">
<h1>Stimm-Training nach Loschky</h1>
<p>Mit der Stimme begeistern und ueberzeugen</p>
</div>
<div id="categories"></div>
<div class="attribution fade-in">Basierend auf dem Hoerbuch von Eva Loschky</div>
</div>

<!-- CATEGORY VIEW -->
<div class="view" id="view-category">
<button class="back-btn" onclick="showHome()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
Zurueck
</button>
<div class="view-title" id="cat-title"></div>
<div id="exercise-list"></div>
</div>

<!-- EXERCISE DETAIL VIEW -->
<div class="view" id="view-exercise">
<button class="back-btn" onclick="showCategory(currentCatId)">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
Zurueck
</button>
<div id="exercise-detail"></div>
</div>

<!-- TIPPS VIEW -->
<div class="view" id="view-tipps">
<button class="back-btn" onclick="showHome()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
Zurueck
</button>
<div class="view-title">8 Tipps zur Stimmpflege</div>
<div id="tipps-list"></div>
</div>

</div>

<!-- Session bar -->
<div class="session-bar">
<div class="session-inner">
<span class="session-text"><span id="done-count">0</span>/<span id="total-count">0</span></span>
<div class="session-progress-wrap"><div class="session-progress-fill" id="session-fill"></div></div>
<span class="session-pct" id="session-pct">0%</span>
</div>
</div>

<script>
/* ── DATA ── */
const categories = [
{
id:'grund',icon:'\u{1F3A4}',title:'Grunduebungen',desc:'Stimme aufwaermen und Mundoeffnung trainieren',
exercises:[
{id:'u2',num:'Uebung 2',name:'Weck deine Stimme auf',timer:120,
steps:['Stehe und federe in den Knien','Oeffne den Mund (1\u20132 Finger breit)','Lass deine Stimme dazu (A-Laut)','Mache kleine Melodieboegen','Mundwinkel entspannen, Zunge beruehrt untere Zahnreihe','Wechsle zwischen Laecheln und entspanntem Mund'],

/* ── STATE ── */
let currentCatId = null;
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let timerRunning = false;

function getProgress(){
try{return JSON.parse(localStorage.getItem('loschky_progress'))||{}}catch(e){return{}}
}
function setDone(id){
const p=getProgress();
const today=new Date().toISOString().slice(0,10);
if(!p[today])p[today]={};
p[today][id]=true;
localStorage.setItem('loschky_progress',JSON.stringify(p));
updateSessionBar();
}
function isDone(id){
const p=getProgress();
const today=new Date().toISOString().slice(0,10);
return p[today]&&p[today][id];
}
function todayCount(){
const p=getProgress();
const today=new Date().toISOString().slice(0,10);
return p[today]?Object.keys(p[today]).length:0;
}
function totalExercises(){
let c=0;categories.forEach(cat=>{if(cat.exercises)c+=cat.exercises.length});return c;
}
function updateSessionBar(){
const done=todayCount(),total=totalExercises();
document.getElementById('done-count').textContent=done;
document.getElementById('total-count').textContent=total;
const pct=total?Math.round(done/total*100):0;
document.getElementById('session-pct').textContent=pct+'%';
document.getElementById('session-fill').style.width=pct+'%';
}

/* ── RENDER ── */
function renderCategories(){
const el=document.getElementById('categories');
el.innerHTML=categories.map((c,i)=>`
<div class="category-card fade-in fade-in-d${i}" onclick="${c.isTipps?'showTipps()':'showCategory(\''+c.id+'\')'}">
<span class="cat-icon">${c.icon}</span>
<div class="cat-title">${c.title}</div>
<div class="cat-desc">${c.desc}</div>
<span class="cat-count">${c.isTipps?c.tipps.length+' Tipps':c.exercises.length+' Uebungen'}</span>
</div>`).join('');
}

function showHome(){
stopTimer();
setView('view-home');
}

function showCategory(catId){
stopTimer();
currentCatId=catId;
const cat=categories.find(c=>c.id===catId);
if(!cat||cat.isTipps)return;
document.getElementById('cat-title').textContent=cat.title;
const el=document.getElementById('exercise-list');
el.innerHTML=cat.exercises.map((ex,i)=>{
const done=isDone(ex.id);
const mins=Math.floor(ex.timer/60);
const secs=ex.timer%60;
const timeStr=mins+':'+(secs<10?'0':'')+secs+' Min';
return `<div class="exercise-item fade-in fade-in-d${i}" onclick="showExercise('${catId}','${ex.id}')">
<div class="ex-left">
<div class="ex-num">${ex.num}</div>
<div class="ex-name">${ex.name}</div>
<div class="ex-time">${timeStr}</div>
</div>
<div class="ex-check${done?' done':''}"></div>
</div>`;
}).join('');
setView('view-category');
}

function showExercise(catId,exId){
stopTimer();
currentCatId=catId;
const cat=categories.find(c=>c.id===catId);
const ex=cat.exercises.find(e=>e.id===exId);
const el=document.getElementById('exercise-detail');
let html=`<div class="detail-header fade-in"><div class="ex-label">${ex.num}</div><h2>${ex.name}</h2></div>`;
html+=`<ul class="instructions fade-in fade-in-d1">${ex.steps.map(s=>'<li>'+s+'</li>').join('')}</ul>`;
if(ex.merke){
html+=`<div class="merke fade-in fade-in-d2"><div class="merke-label">Merke</div><p>${ex.merke}</p></div>`;
}
if(ex.timer){
const mins=Math.floor(ex.timer/60);
const secs=ex.timer%60;
html+=`<div class="timer-container fade-in fade-in-d3">
<div class="timer-display" id="timer-display">${pad(mins)}:${pad(secs)}</div>
<div class="timer-progress"><div class="timer-progress-bar" id="timer-bar"></div></div>
<div class="timer-buttons">
<button class="timer-btn btn-start" id="btn-start" onclick="startTimer(${ex.timer},'${ex.id}')">Start</button>
<button class="timer-btn btn-pause" id="btn-pause" onclick="pauseTimer()" style="display:none">Pause</button>
<button class="timer-btn btn-reset" id="btn-reset" onclick="resetTimer(${ex.timer})" style="display:none">Reset</button>
<button class="timer-btn btn-done" id="btn-done" onclick="markDone('${ex.id}')" style="display:none">Fertig \u2713</button>
</div>
</div>`;
}
el.innerHTML=html;
timerRemaining=ex.timer;
timerTotal=ex.timer;
setView('view-exercise');
}

function showTipps(){
const cat=categories.find(c=>c.isTipps);
const el=document.getElementById('tipps-list');
el.innerHTML=cat.tipps.map((t,i)=>`
<div class="info-card fade-in fade-in-d${Math.min(i,4)}">
<div class="info-num">${i+1}</div>
<h3>${t.title}</h3>
<p>${t.text}</p>
</div>`).join('');
setView('view-tipps');
}

function setView(id){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');
window.scrollTo({top:0,behavior:'smooth'});
}

/* ── TIMER ── */
function pad(n){return n<10?'0'+n:''+n}

function startTimer(duration,exId){
if(!timerRunning){
if(timerRemaining<=0)timerRemaining=duration;
timerTotal=duration;
timerRunning=true;
document.getElementById('btn-start').style.display='none';
document.getElementById('btn-pause').style.display='';
document.getElementById('btn-reset').style.display='';
document.getElementById('btn-done').style.display='none';
timerInterval=setInterval(()=>{
timerRemaining--;
updateTimerDisplay();
if(timerRemaining<=0){
stopTimer();
document.getElementById('btn-start').style.display='none';
document.getElementById('btn-pause').style.display='none';
document.getElementById('btn-done').style.display='';
if(navigator.vibrate)navigator.vibrate([200,100,200]);
markDone(exId);
}
},1000);
}
}
function pauseTimer(){
timerRunning=false;
clearInterval(timerInterval);
document.getElementById('btn-start').style.display='';
document.getElementById('btn-start').textContent='Weiter';
document.getElementById('btn-pause').style.display='none';
}
function resetTimer(duration){
stopTimer();
timerRemaining=duration;timerTotal=duration;
updateTimerDisplay();
document.getElementById('btn-start').style.display='';
document.getElementById('btn-start').textContent='Start';
document.getElementById('btn-pause').style.display='none';
document.getElementById('btn-reset').style.display='none';
document.getElementById('btn-done').style.display='none';
}
function stopTimer(){
timerRunning=false;clearInterval(timerInterval);
}
function updateTimerDisplay(){
const m=Math.floor(timerRemaining/60);
const s=timerRemaining%60;
const disp=document.getElementById('timer-display');
if(disp)disp.textContent=pad(m)+':'+pad(s);
const bar=document.getElementById('timer-bar');
if(bar)bar.style.width=((timerTotal-timerRemaining)/timerTotal*100)+'%';
}
function markDone(exId){
setDone(exId);
updateSessionBar();
/* refresh check in category list if we go back */
}

/* ── INIT ── */
renderCategories();
updateSessionBar();

/* ── SERVICE WORKER (inline) ── */
if('serviceWorker' in navigator){
const swCode=`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>self.clients.claim());
self.addEventListener('fetch',e=>{
e.respondWith(
caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
return caches.open('loschky-v1').then(c=>{c.put(e.request,res.clone());return res;});
}).catch(()=>new Response('Offline',{status:503})))
);
});`;
const blob=new Blob([swCode],{type:'application/javascript'});
navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
